spring.application.name=ethara-manager
server.port=${PORT:8080}

spring.datasource.url=${JDBC_DATABASE_URL:jdbc:h2:mem:ethara;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${JDBC_DATABASE_USERNAME:sa}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${JDBC_DATABASE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true

ethara.jwt.secret=${JWT_SECRET:change-this-development-secret-to-a-long-random-production-secret}
ethara.jwt.ttl-seconds=${JWT_TTL_SECONDS:86400}
